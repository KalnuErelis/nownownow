<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Jaunius Kadunas</title>
    <meta name="description" content="{{ meta_description }}">
    <meta name="robots" content="{{ robots_directive }}">
    <link rel="canonical" href="{{ canonical_url }}">

    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_description }}">
    <meta property="og:url" content="{{ og_url }}">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ og_title }}">
    <meta name="twitter:description" content="{{ og_description }}">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <nav class="navigation">
            <a href="index.html" class="{{ now_active }}">Now</a>
            <a href="me.html" class="{{ me_active }}">About Me</a>
            <a href="agents.html" class="{{ agents_active }}">Agents</a>
        </nav>

        <header class="intro">
            <h1>{{ page_title }}</h1>
            <p class="roles">{{ roles }}</p>
            <p class="summary">{{ summary }}</p>
            <p class="update-note">{{ subtitle }}</p>
        </header>

        <div class="content-grid">
            {{ content }}
        </div>

        <footer>
            <p>This site follows the <a href="https://nownownow.com/about" target="_blank" rel="noopener">now page</a> philosophy by <a href="https://sive.rs/now" target="_blank" rel="noopener">Derek Sivers</a>.</p>
            <p><a href="mailto:your-email@example.com">Get in touch</a> if you'd like to connect!</p>
        </footer>
    </main>
</body>
</html>
