<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Jaunius Kadunas</title>
    <meta name="description" content="{{ meta_description }}">
    <meta name="robots" content="{{ robots_directive }}">
    <link rel="canonical" href="{{ canonical_url }}">

    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_description }}">
    <meta property="og:url" content="{{ og_url }}">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ og_title }}">
    <meta name="twitter:description" content="{{ og_description }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-shell">
        <aside class="sidebar">
            <a class="brand-mark" href="index.html" aria-label="Jaunius Kadunas home">JK</a>

            <div class="sidebar-copy">
                <p class="eyebrow">Jaunius Kadunas</p>
                <h1>{{ page_title }}</h1>
                <p class="roles">{{ roles }}</p>
                <p class="summary">{{ summary }}</p>
                <p class="update-note">{{ subtitle }}</p>
            </div>

            <nav class="navigation" aria-label="Primary">
                <a href="index.html" class="{{ now_active }}">Now</a>
                <a href="me.html" class="{{ me_active }}">About</a>
                <a href="agents.html" class="{{ agents_active }}">Agents</a>
            </nav>
        </aside>

        <main class="content-column">
            <div class="content-grid">
                {{ content }}
            </div>

            <footer>
                <p>This is a living personal site shaped by the <a href="https://nownownow.com/about" target="_blank" rel="noopener">now page</a> idea.</p>
                <p><a href="me.html">Read more about my background</a>.</p>
            </footer>
        </main>
    </div>
</body>
</html>
